<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Ludiflex</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
    <div class="container">
        <div class="form-container left-side">
            <div class="form-blob">
                <img src="../../assets/images/illustration.svg" class="left-image" alt="illustration">
            </div>
        </div>

        <div class="form-container right-side">
            <p>Join our community today</p>
            <h1>Create Account</h1>

            <form class="form-box" id="registerForm">
                <div class="input-group">
                    <input type="text" id="fullname" class="input-field" placeholder=" " required>
                    <label for="fullname" class="floating-label">Full Name</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder=" " required>
                    <label for="email" class="floating-label">Email Address</label>
                </div>

                <div class="input-group password-group">
                    <input type="password" id="password" class="input-field" placeholder=" " required>
                    <label for="password" class="floating-label">Password</label>
                    <span class="eye-icon" id="togglePassword">👁</span>
                </div>

                <div class="input-group password-group">
                    <input type="password" id="confirmPassword" class="input-field" placeholder=" " required>
                    <label for="confirmPassword" class="floating-label">Confirm Password</label>
                </div>

                <button type="submit" class="form-btn form-btn--submit" id="registerBtn">Sign Up</button>
                <p id="message"></p>
            </form>

            <div class="form-bottom">
                <p>Already have an account? <a href="login.html" class="form-link">Sign In</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="../../assets/js/auth/register.js"></script>
</body>
</html>
