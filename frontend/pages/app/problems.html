<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problems | Ludiflex</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-mark">L</div>
      <span class="sidebar__logo-name">Ludiflex</span>
    </div>
    <nav class="sidebar__nav">
      <span class="nav-section-label">Main</span>
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="problems.html" class="nav-item active">
        <span class="nav-icon">🧩</span> Problems
      </a>
      <span class="nav-section-label">Account</span>
      <a href="profile.html" class="nav-item">
        <span class="nav-icon">👤</span> Profile
      </a>
      <a href="#" class="nav-item" id="settingsBtn">
        <span class="nav-icon">⚙️</span> Settings
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="user-avatar" id="sidebarAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebarName">Loading...</div>
          <div class="user-role">Member</div>
        </div>
        <button class="sidebar__logout" id="logoutBtn" title="Log out">↩</button>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">
    <header class="topbar">
      <span class="topbar__title">Problems</span>
      <div class="topbar__search">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search by title...">
      </div>
    </header>

    <div class="page-content">

      <!-- Filter bar -->
      <div class="filter-bar fade-up">
        <!-- Platform pills -->
        <button class="filter-btn active" data-platform="all">All Platforms</button>
        <button class="filter-btn" data-platform="leetcode">🟠 LeetCode</button>
        <button class="filter-btn" data-platform="codeforces">🔵 Codeforces</button>
        <button class="filter-btn" data-platform="hackerrank">🟢 HackerRank</button>

        <select class="filter-select" id="diffFilter">
          <option value="all">All Difficulties</option>
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>

        <select class="filter-select" id="statusFilter">
          <option value="all">All Status</option>
          <option value="Solved">Solved</option>
          <option value="Attempted">Attempted</option>
          <option value="Unsolved">Unsolved</option>
        </select>

        <select class="filter-select" id="sortFilter">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="title">Title A→Z</option>
        </select>

        <!-- Add problem button -->
        <button class="btn-primary" id="addProblemBtn" style="margin-left:auto;">+ Add Problem</button>
      </div>

      <!-- Table -->
      <div class="problems-table-wrap card fade-up fade-up-1" style="padding:0;">
        <table class="problems-table" id="problemsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Platform</th>
              <th>Difficulty</th>
              <th>Status</th>
              <th>Tags</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="problemsBody">
            <tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:40px 0;">Loading problems...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>

    </div>
  </main>

  <!-- ── ADD PROBLEM MODAL ── -->
  <div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <h2 style="font-family:var(--font-display);font-size:18px;">Add Problem</h2>
        <button id="closeModal" style="font-size:20px;color:var(--text-muted);transition:color 0.15s;" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--text-muted)'">✕</button>
      </div>

      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Problem Title *</label>
          <input class="form-input" type="text" id="mTitle" placeholder="e.g. Two Sum">
        </div>
        <div class="form-group">
          <label class="form-label">Platform *</label>
          <select class="form-input" id="mPlatform">
            <option value="">Select platform</option>
            <option value="LeetCode">LeetCode</option>
            <option value="Codeforces">Codeforces</option>
            <option value="HackerRank">HackerRank</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Difficulty *</label>
          <select class="form-input" id="mDifficulty">
            <option value="">Select difficulty</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-input" id="mStatus">
            <option value="Solved">Solved</option>
            <option value="Attempted">Attempted</option>
            <option value="Unsolved">Unsolved</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Problem URL</label>
          <input class="form-input" type="url" id="mUrl" placeholder="https://leetcode.com/problems/...">
        </div>
        <div class="form-group full">
          <label class="form-label">Tags (comma separated)</label>
          <input class="form-input" type="text" id="mTags" placeholder="e.g. array, hash-map, two-pointer">
        </div>
        <div class="form-group full">
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" id="mNotes" placeholder="Any notes about approach, time complexity..."></textarea>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:24px;justify-content:flex-end;">
        <button class="btn-outline" id="cancelModal">Cancel</button>
        <button class="btn-primary" id="submitProblem">Save Problem</button>
      </div>
      <p id="modalMsg" style="margin-top:12px;font-size:13px;text-align:center;"></p>
    </div>
  </div>

  <script type="module" src="../../assets/js/global.js"></script>
  <script type="module" src="../../assets/js/app/problems.js"></script>
</body>
</html>
