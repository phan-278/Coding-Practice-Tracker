<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form | Ludiflex</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>

    <div class="container">

        <div class="form-container left-side">
            <div class="form-blob">
                <img src="../../assets/images/illustration.svg" class="left-image" alt="illustration">
            </div>
        </div>

        <div class="form-container right-side">
            <p>Please enter your details to login to your account</p>
            <h1>Welcome Back!</h1>

            <form class="form-box" id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder=" " required>
                    <label for="email" class="floating-label">Email Address</label>
                </div>

                <div class="input-group password-group">
                    <input type="password" id="password" class="input-field" placeholder=" " required>
                    <label for="password" class="floating-label">Password</label>
                    <span class="eye-icon" id="togglePassword">👁</span>
                </div>

                <div class="input-group checkbox-group">
                    <div class="form-col remember-me">
                        <input type="checkbox" id="remember-me-checkbox" class="checkbox-field">
                        <label for="remember-me-checkbox">Remember Me</label>
                    </div>

                    <div class="form-col">
                        <a href="#" class="forgot-password-link">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="form-btn form-btn--submit" id="loginBtn">Sign In</button>
                <p id="message"></p>
            </form>

            <div class="form-divider">
                <p>Or</p>
            </div>

            <div class="form-bottom">
                <div class="form-social">
                    <button class="form-btn form-btn--social" type="button">
                        Sign in with Google
                        <img src="../../assets/images/google.svg" class="btn-icon" alt="Google Icon">
                    </button>

                    <button class="form-btn form-btn--social" type="button">
                        Sign in with Facebook
                        <img src="../../assets/images/facebook.svg" class="btn-icon" alt="Facebook Icon">
                    </button>

                    <button class="form-btn form-btn--social" type="button">
                        Sign in with Twitter
                        <img src="../../assets/images/twitter.svg" class="btn-icon" alt="Twitter Icon">
                    </button>
                </div>

                <p>Don't have an account? <a href="register.html" class="form-link">Sign Up</a></p>
            </div>
        </div>

    </div>

    <script type="module" src="../../assets/js/auth/login.js"></script>
</body>
</html>
