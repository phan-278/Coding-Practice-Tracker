<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lịch của tôi — Kép Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Be+Vietnam+Pro:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/global.css"/>
  <link rel="stylesheet" href="../../assets/css/dashboard.css"/>
  <link rel="stylesheet" href="../../assets/css/responsive.css"/>
</head>
<body>
<div class="dash-layout">
  <aside class="dash-sidebar">
    <div class="dash-brand">
      <a class="dash-brand-name" href="../../index.html">"Kép"</a>
      <span class="dash-brand-role">User Portal</span>
    </div>
    <nav class="dash-nav">
      <div class="dash-nav-section">Tổng quan</div>
      <a class="dash-nav-link" href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
      <div class="dash-nav-section">Booking</div>
      <a class="dash-nav-link" href="../booking/new-booking.html"><span class="nav-icon">＋</span> Đặt lịch mới</a>
      <a class="dash-nav-link active" href="my-bookings.html"><span class="nav-icon">◷</span> Lịch của tôi</a>
      <div class="dash-nav-section">Tài khoản</div>
      <a class="dash-nav-link" href="profile.html"><span class="nav-icon">◎</span> Hồ sơ</a>
      <a class="dash-nav-link" href="settings.html"><span class="nav-icon">⚙</span> Cài đặt</a>
    </nav>
    <div class="dash-sidebar-footer">
      <div class="dash-user-info">
        <div class="dash-user-avatar" id="avatarInitials">—</div>
        <div>
          <div class="dash-user-name" id="sidebarName">—</div>
        </div>
      </div>
      <button class="dash-logout-btn" onclick="doLogout()">Đăng xuất</button>
    </div>
  </aside>

  <div class="dash-main">
    <div class="dash-topbar">
      <h1 class="dash-page-title">Lịch của tôi</h1>
      <div class="dash-topbar-actions">
        <a class="dash-action-btn primary" href="../booking/new-booking.html">+ Đặt lịch mới</a>
      </div>
    </div>

    <div class="dash-content">
      <!-- Filters -->
      <div class="filters-bar">
        <button class="filter-chip active" onclick="setFilter('all',this)">Tất cả</button>
        <button class="filter-chip" onclick="setFilter('pending',this)">Chờ duyệt</button>
        <button class="filter-chip" onclick="setFilter('confirmed',this)">Đã xác nhận</button>
        <button class="filter-chip" onclick="setFilter('rejected',this)">Từ chối</button>
      </div>

      <div id="bookingsList"></div>
    </div>
  </div>
</div>

<!-- Cancel modal -->
<div class="dash-modal-overlay" id="cancelModal">
  <div class="dash-modal-box">
    <button class="dash-modal-close" onclick="closeCancelModal()">✕</button>
    <h3 class="dash-modal-title">Hủy booking?</h3>
    <p style="font-family:var(--font-body);font-size:.68rem;color:var(--warm-grey);margin-bottom:24px;line-height:1.7;">
      Bạn có chắc muốn hủy booking này không? Hành động này không thể hoàn tác.
    </p>
    <div style="display:flex;gap:12px;justify-content:flex-end;">
      <button onclick="closeCancelModal()" class="tbl-action-btn edit" style="padding:10px 20px;">Không</button>
      <button onclick="confirmCancel()" class="tbl-action-btn reject" style="padding:10px 20px;">Xác nhận hủy</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CURRENT_USER_KEY = 'kep_current_user';
const BOOKINGS_KEY     = 'kep_bookings';

const user = JSON.parse(localStorage.getItem(CURRENT_USER_KEY) || 'null');
if (!user) window.location.href = '../auth/login.html';

let currentFilter = 'all';
let cancelTarget  = null;

document.addEventListener('DOMContentLoaded', () => {
  if (!user) return;
  const initials = user.name.trim().split(/\s+/).map(w => w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('avatarInitials').textContent = initials;
  document.getElementById('sidebarName').textContent    = user.name;
  renderList();
});

function getMyBookings() {
  const all = JSON.parse(localStorage.getItem(BOOKINGS_KEY) || '[]');
  return all.filter(b => b.name === user.name || b.phone === user.phone || b.email === user.email);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  let bookings = getMyBookings();
  if (currentFilter !== 'all') bookings = bookings.filter(b => b.status === currentFilter);

  const wrap = document.getElementById('bookingsList');

  if (!bookings.length) {
    wrap.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">◷</div>
      <div class="empty-state-title">Không có booking nào</div>
      <div class="empty-state-sub">Thử chọn bộ lọc khác hoặc đặt lịch mới.</div>
    </div>`;
    return;
  }

  const STATUS = { pending:'Chờ duyệt', confirmed:'Đã xác nhận', rejected:'Từ chối', cancelled:'Đã hủy' };
  const BADGE  = { pending:'badge-pending', confirmed:'badge-confirmed', rejected:'badge-rejected', cancelled:'badge-cancelled' };

  wrap.innerHTML = bookings.map(b => {
    const canCancel = b.status === 'pending';
    return `
    <div class="booking-card">
      <div>
        <div class="booking-card-code">${b.id}</div>
        <div class="booking-card-zone">${b.zone || '—'} Zone</div>
        <div class="booking-card-meta">
          ${b.date ? formatDate(b.date) : '—'} &nbsp;·&nbsp;
          ${b.startTime || '—'} — ${endTime(b.startTime, b.duration)} &nbsp;·&nbsp;
          ${b.duration || '—'}h
        </div>
        ${b.note ? `<div class="booking-card-meta" style="margin-top:4px;font-style:italic;">"${b.note}"</div>` : ''}
      </div>
      <div class="booking-card-right">
        <div class="booking-card-amount">${b.total ? b.total.toLocaleString() + 'K' : 'Liên hệ'}</div>
        <span class="badge ${BADGE[b.status] || ''}">${STATUS[b.status] || b.status}</span>
        ${canCancel ? `<br><button class="tbl-action-btn reject" style="margin-top:8px;" onclick="openCancelModal('${b.id}')">Hủy</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function endTime(start, dur) {
  if (!start || !dur) return '—';
  const [h, m] = start.split(':').map(Number);
  return String(h + dur).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

function formatDate(str) {
  if (!str) return '—';
  const [y, m, d] = str.split('-');
  return `${d}/${m}/${y}`;
}

function openCancelModal(id) {
  cancelTarget = id;
  document.getElementById('cancelModal').classList.add('open');
}

function closeCancelModal() {
  cancelTarget = null;
  document.getElementById('cancelModal').classList.remove('open');
}

function confirmCancel() {
  if (!cancelTarget) return;
  const bookings = JSON.parse(localStorage.getItem(BOOKINGS_KEY) || '[]');
  const b = bookings.find(x => x.id === cancelTarget);
  if (b) { b.status = 'cancelled'; localStorage.setItem(BOOKINGS_KEY, JSON.stringify(bookings)); }
  closeCancelModal();
  showToast('Đã hủy booking ' + cancelTarget);
  renderList();
}

function doLogout() {
  localStorage.removeItem(CURRENT_USER_KEY);
  window.location.href = '../../index.html';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
