<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập — Kép Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Be+Vietnam+Pro:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/auth.css"/>
</head>
<body>

<div class="auth-page-wrap">
  <!-- Brand -->
  <div class="auth-brand">
    <a href="../../index.html" class="auth-brand-name">"Kép"</a>
    <span class="auth-brand-sub">Da Space · HCMC</span>
  </div>

  <div class="auth-card">
    <h1 class="auth-card-title">Đăng nhập</h1>
    <p class="auth-card-sub">Chào mừng trở lại — tiếp tục sáng tạo cùng Kép.</p>

    <!-- Tabs -->
    <div class="auth-tabs">
      <a class="auth-tab-btn active" href="login.html">Đăng nhập</a>
      <a class="auth-tab-btn" href="register.html">Đăng ký</a>
    </div>

    <!-- Message -->
    <p class="auth-msg" id="loginMessage"></p>

    <!-- Form -->
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="loginEmail">Email *</label>
        <input type="email" id="loginEmail" placeholder="you@email.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="loginPassword">Mật khẩu *</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="auth-submit-btn">Đăng nhập →</button>
    </form>

    <div class="auth-divider"><span>hoặc</span></div>

    <p class="auth-footer-note">
      Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
    </p>
  </div>

  <a class="auth-back-link" href="../../index.html">← Quay về trang chủ</a>
</div>

<script>
/* ── Constants ── */
const USERS_KEY       = 'kep_users';
const CURRENT_USER_KEY = 'kep_current_user';

/* ── Show message ── */
function showMessage(text, type = 'error') {
  const el = document.getElementById('loginMessage');
  if (!el) return;
  el.textContent = text;
  el.className = 'auth-msg ' + (type === 'success' ? 'success' : 'error');
  el.style.display = 'block';
}

/* ── Handle login ── */
function handleLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    showMessage('Vui lòng nhập đầy đủ email và mật khẩu.'); return;
  }

  const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
  const user  = users.find(u => u.email === email && u.password === btoa(password));

  if (!user) {
    showMessage('Email hoặc mật khẩu không đúng.'); return;
  }

  localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
  showMessage('Đăng nhập thành công. Chào ' + user.name + '!', 'success');

  setTimeout(() => {
    /* Nếu đang trong iframe → reload parent, không thì redirect dashboard */
    if (window.parent !== window) {
      window.parent.location.reload();
    } else {
      window.location.href = '../../pages/app/dashboard.html';
    }
  }, 900);
}

document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
</script>
</body>
</html>
